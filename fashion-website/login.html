<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập Thành Viên</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">FASHION ZONE</div>
        <nav>
            <ul class="menu">
                <li><a href="index.html">Trang chủ</a></li>
                <li><a href="trends.html">Xu hướng</a></li>
                <li><a href="beauty.html">Làm đẹp</a></li>

                <li><a href="login.html" class="active">Đăng nhập</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="login-container">
            <h2 style="text-align:center; margin-bottom: 20px;">ĐĂNG NHẬP</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Tên đăng nhập / Email</label>
                    <input type="text" id="username" placeholder="Nhập tài khoản...">
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu...">
                </div>
                <button type="submit" class="btn-submit">VÀO HỆ THỐNG</button>
            </form>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
